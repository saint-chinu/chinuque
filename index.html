  canvas.height = w;
}

function buildPositions(size) {
  const PAD = size * 0.12, pos = [];
  for (let i = 0; i < 5; i++) pos.push({ x: PAD + i * (size - PAD * 2) / 4, y: PAD });
  for (let i = 1; i <= 4; i++) pos.push({ x: size - PAD, y: PAD + i * (size - PAD * 2) / 5 });
  for (let i = 4; i >= 0; i--) pos.push({ x: PAD + i * (size - PAD * 2) / 4, y: size - PAD });
  for (let i = 4; i >= 1; i--) pos.push({ x: PAD, y: PAD + i * (size - PAD * 2) / 5 });
  return pos;
}

let positions = [];

function initBoard() {
  resizeCanvas();
  positions = buildPositions(canvas.width);
  window.addEventListener('resize', () => { resizeCanvas(); positions = buildPositions(canvas.width); drawBoard(); });
  canvas.addEventListener('click', onCanvasClick);
}

function getCellStyle(type) {
  return {
    goal:  { bg: '#2a1e00', bd: '#ffd700' },
    empty: { bg: '#0e1e0e', bd: '#3fb950' },
    land:  { bg: '#0e1624', bd: '#58a6ff' },
    shop:  { bg: '#1a0f2e', bd: '#9f7ae8' },
    cp:    { bg: '#1e1e00', bd: '#f7c948' },
  }[type] || { bg: '#0e1e0e', bd: '#555' };
}

function drawBoard() {
  if (!roomState) return;
  const cells = roomState.cells || {};
  const players = roomState.players || {};
  const size = canvas.width;
  const r = size * 0.055;

  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#080c10';
  ctx.fillRect(0, 0, size, size);

  // ドット背景
  for (let x = 0; x < size; x += 30) for (let y = 0; y < size; y += 30) {
    ctx.fillStyle = '#141c24'; ctx.fillRect(x, y, 1, 1);
  }

  // 接続線
  for (let i = 0; i < N; i++) {
    const next = (i + 1) % N;
    const a = positions[i], b = positions[next];
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = '#1e2a38'; ctx.lineWidth = 4; ctx.stroke();
  }

  // マス描画
  Object.values(cells).forEach(cell => {
    const pos = positions[cell.id];
    if (!pos) return;
    const st = getCellStyle(cell.type);

    if (cell.owner) { ctx.shadowColor = ATTR[cell.attr]?.color || '#888'; ctx.shadowBlur = 8; }
    ctx.fillStyle = st.bg;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = cell.owner ? (Object.values(players).find(p => p.uid === cell.owner)?.color || st.bd) : st.bd;
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;

    // 属性リング
    if (cell.attr !== 'none' && cell.type === 'land') {
      ctx.strokeStyle = ATTR[cell.attr]?.color || '#888'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r + 4, 0, Math.PI * 2); ctx.stroke();
    }

    ctx.textAlign = 'center';
    const fs = Math.max(10, r * 0.7);
    if (cell.type === 'cp') {
      ctx.font = `bold ${fs * .85}px "Noto Sans JP"`;
      ctx.fillStyle = '#f7c948'; ctx.fillText('CP', pos.x, pos.y + fs * .3);
      ctx.font = `${fs * .55}px monospace`;
      ctx.fillStyle = '#f7c948aa'; ctx.fillText('+100G', pos.x, pos.y - r - 4);
    } else if (cell.type === 'goal') {
      ctx.font = `${fs * 1.2}px serif`; ctx.fillText('⭐', pos.x, pos.y + fs * .4);
    } else if (cell.type === 'shop') {
      ctx.font = `${fs * 1.1}px serif`; ctx.fillText('🃏', pos.x, pos.y + fs * .4);
    } else if (cell.type === 'land') {
      const icon = cell.monster?.icon || (cell.attr === 'fire' ? '🔥' : cell.attr === 'water' ? '💧' : '🌿');
      ctx.font = `${fs}px serif`; ctx.fillText(icon, pos.x, pos.y + fs * .35);
      // 通行料
      const toll = calcToll(cell, cell.monster);
      ctx.font = `${fs * .55}px monospace`; ctx.fillStyle = '#ffaa44';
      ctx.fillText(`${toll}G`, pos.x, pos.y - r - 4);
    } else {
      ctx.font = `${fs * .7}px "Noto Sans JP"`; ctx.fillStyle = '#3a5a3a';
      ctx.fillText(cell.id, pos.x, pos.y + fs * .28);
    }
  });

  // コマ描画
  const playerArr = Object.values(players);
  playerArr.forEach((p, idx) => {
    const pos = positions[p.pos] || positions[0];
    const angle = (idx / Math.max(playerArr.length, 2)) * Math.PI * 2 - Math.PI / 2;
    const d = r * 0.8;
    const x = pos.x + Math.cos(angle) * d;
    const y = pos.y + Math.sin(angle) * d;
    const pr = r * 0.58;

    ctx.shadowColor = p.color || '#888'; ctx.shadowBlur = 16;
    ctx.fillStyle = (p.color || '#888') + '44';
    ctx.beginPath(); ctx.arc(x, y, pr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = p.color || '#888'; ctx.lineWidth = p.uid === roomState?.turn?.uid ? 3 : 1.8;
    ctx.beginPath(); ctx.arc(x, y, pr, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.font = `${Math.max(10, pr)}px serif`; ctx.textAlign = 'center';
    ctx.fillText(p.icon, x, y + pr * .38);

    // 名前
    ctx.font = `bold ${Math.max(8, pr * .5)}px "Noto Sans JP"`;
    ctx.fillStyle = p.color || '#888';
    ctx.fillText(p.uid === myUid ? '自分' : (p.isAI ? 'AI' : p.name), x, y - pr - 4);

    // HP tiny bar
    const bw = pr * 2, bx = x - bw / 2, by = y + pr + 3;
    const hpPct = (p.baseHp + p.addHp) / (p.baseMaxHp + (p.addHpMax || 0));
    ctx.fillStyle = '#111'; ctx.fillRect(bx, by, bw, 3);
    ctx.fillStyle = hpPct > .5 ? '#22cc44' : hpPct > .25 ? '#ddcc00' : '#cc2200';
    ctx.fillRect(bx, by, bw * Math.max(0, hpPct), 3);
  });
}

// ===== リアルタイム更新 =====
function onRoomUpdate(state) {
  roomState = state;
  drawBoard();
  updateStatusBar();

  // 勝利判定
  const goal = state.config?.goalAssets || 10000;
  const players = Object.values(state.players || {});
  const winner = players.find(p => totalAssets(p, state.cells || {}) >= goal);
  if (winner || state.status === 'finished') {
    showFinalResult(players, state.cells || {});
    return;
  }

  // 自分のターン
  if (state.turn?.uid === myUid) {
    showMyTurnUI();
  } else {
    setMsg(`${getPlayerName(state.turn?.uid)} のターン…`);
    setCmds([]);
  }
}

function getPlayerName(uid) {
  if (!roomState) return '???';
  const p = roomState.players?.[uid];
  return p ? `${p.icon} ${p.isAI ? 'AI' : p.name}` : '???';
}

// ===== ステータスバー =====
function updateStatusBar() {
  if (!roomState) return;
  const bar = document.getElementById('statusBar');
  const players = Object.values(roomState.players || {});
  const cells = roomState.cells || {};
  const ranks = getRanks(players, cells);
  const rankEmoji = ['🥇', '🥈', '🥉', '4位'];
  const inner = document.createElement('div');
  inner.className = 'sbar-inner';

  players.forEach(p => {
    const ta = totalAssets(p, cells);
    const rank = ranks[p.uid];
    const isMyTurn = p.uid === roomState.turn?.uid;
    const isMe = p.uid === myUid;
    const card = document.createElement('div');
    card.className = `pcard${isMyTurn ? ' my-turn' : ''}${isMe ? ' me' : ''}`;
    card.style.borderColor = isMyTurn ? p.color : isMe ? 'var(--water)' : 'var(--border)';
    card.innerHTML = `
      <div class="pcard-top">
        <span class="pcard-icon">${p.icon}</span>
        <span class="pcard-name" style="color:${p.color}">${isMe ? '自分' : (p.isAI ? 'AI' : p.name)}</span>
        <span class="pcard-rank">${rankEmoji[rank - 1] || rank + '位'}</span>
      </div>
      <div class="pcard-row">総資産 <span>${ta}G</span></div>
      <div class="pcard-row">手持 <span>${p.gold}G</span> HP <span style="color:${p.baseHp/p.baseMaxHp>.5?'var(--hg)':p.baseHp/p.baseMaxHp>.25?'var(--hy)':'var(--hr)'}">${p.baseHp}+${p.addHp}</span></div>
      <div class="pcard-row">ATK <span>${p.baseAtk}</span> LAP <span>${p.lapCount || 0}</span></div>
    `;
    card.onclick = () => showPlayerDetail(p, cells);
    inner.appendChild(card);
  });

  const ti = document.createElement('div');
  ti.className = 'turn-info';
  ti.innerHTML = `<b>${roomState.turn?.count || 1}</b>ターン`;
  inner.appendChild(ti);

  bar.innerHTML = '';
  bar.appendChild(inner);
}

function getRanks(players, cells) {
  const sorted = [...players].sort((a, b) => totalAssets(b, cells) - totalAssets(a, cells));
  const ranks = {};
  sorted.forEach((p, i) => ranks[p.uid] = i + 1);
  return ranks;
}

// ===== 自分のターンUI =====
function showMyTurnUI() {
  const p = roomState?.players?.[myUid];
  if (!p) return;
  setMsg(`${p.icon} あなたのターン！`);
  const cmds = [];
  if (p.spells?.length > 0) {
    cmds.push({ label: '🎴 スペルを使う', cls: 'purple', fn: showSpellSelect });
  }
  cmds.push({ label: '🎲 ダイスを振る', cls: 'green', fn: rollDice });
  setCmds(cmds);
}

// ===== ダイス =====
let diceRollInProgress = false;

async function rollDice() {
  if (diceRollInProgress) return;
  diceRollInProgress = true;
  setCmds([]);

  const p = roomState?.players?.[myUid];
  if (!p) return;

  const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
  let f = 0;
  const id = setInterval(() => {
    document.getElementById('diceDisp').textContent = faces[Math.floor(Math.random() * 6)];
    if (++f > 12) clearInterval(id);
  }, 70);
  await wait(950);

  let roll;
  // イカサマ
  if (p.effects?.fixDice !== null && p.effects?.fixDice !== undefined) {
    roll = p.effects.fixDice;
    await updatePlayer(currentRoomCode, myUid, { 'effects/fixDice': null });
  }
  // 牛歩
  else if (p.effects?.slowDice > 0) {
    roll = Math.floor(Math.random() * 2) + 1;
    const newSlow = p.effects.slowDice - 1;
    await updatePlayer(currentRoomCode, myUid, { 'effects/slowDice': newSlow });
  }
  else {
    roll = Math.floor(Math.random() * 6) + 1;
  }

  document.getElementById('diceDisp').textContent = faces[roll - 1];

  // ヘイスト
  let subRoll = 0;
  if (p.effects?.haste > 0) {
    subRoll = Math.floor(Math.random() * 3) + 1;
    document.getElementById('subDiceDisp').style.display = 'block';
    document.getElementById('subDiceDisp').textContent = `+${subRoll}`;
    const newHaste = p.effects.haste - 1;
    await updatePlayer(currentRoomCode, myUid, { 'effects/haste': newHaste });
  }

  // うさぎ：3回に1回ヘイスト
  if (p.charId === 'usagi') {
    const drc = (p.diceRollCount || 0) + 1;
    if (drc % 3 === 0) {
      subRoll += Math.floor(Math.random() * 3) + 1;
      setMsg(`⚡ うさぎのヘイスト！ +${subRoll}マス！`);
    }
    await updatePlayer(currentRoomCode, myUid, { diceRollCount: drc });
  }

  const total = roll + subRoll;
  setMsg(`${p.icon} ダイス <span style="color:var(--text-gold);font-size:16px">${roll}</span>${subRoll > 0 ? ` + ${subRoll} = ${total}` : ''}`);
  await wait(500);
  await movePlayer(p, total);
  diceRollInProgress = false;
}

// ===== 移動 =====
async function movePlayer(p, steps) {
  let currentPos = p.pos;
  const passedCells = [];

  for (let s = 0; s < steps; s++) {
    currentPos = (currentPos + 1) % N;

    // ゴール通過（途中）
    if (currentPos === 0 && s < steps - 1) {
      await handleGoalPass(p, false);
    }
    // CP通過
    const cell = roomState?.cells?.[currentPos];
    if (cell?.type === 'cp' && !p.cpDone) {
      await updatePlayer(currentRoomCode, myUid, {
        pos: currentPos, cpDone: true, gold: p.gold + 100
      });
      p = roomState?.players?.[myUid] || p;
      setMsg(`⚑ <span style="color:var(--cp)">CP通過！ +100G</span>`);
      await fbAddLog(currentRoomCode, `${p.name} CP通過 +100G`);
      await wait(600);
    } else {
      await updatePlayer(currentRoomCode, myUid, { pos: currentPos });
    }

    // 自分の土地を通過した場合は記録
    if (cell?.owner === myUid && cell?.type === 'land') {
      passedCells.push(currentPos);
    }

    drawBoard();
    await wait(250);
  }

  p = roomState?.players?.[myUid] || p;
  // 通過した自分の土地へのコマンド
  if (passedCells.length > 0) {
    // 土地コマンド（通過）
    // ゴールやCPにぴったり止まった場合は全土地対象（後で処理）
  }

  await landEvent(p, currentPos, passedCells);
}

// ===== ゴール通過 =====
async function handleGoalPass(p, isExact) {
  const cells = roomState?.cells || {};
  let bonus = 0;
  let lapBonusMult = 1;

  if (p.cpDone) {
    const lapCount = (p.lapCount || 0) + 1;
    const lapBaseBonus = 500 + (lapCount - 1) * 100;
    const landVal = Object.values(cells).filter(c => c.owner === myUid && c.type === 'land')
      .reduce((s, c) => s + landAssetValue(c, cells, myUid), 0);
    const landBonus = Math.floor(landVal * 0.1);
    // 凱旋効果
    if (p.effects?.lapBoost) lapBonusMult = p.effects.lapBoost.value;
    bonus = Math.floor((lapBaseBonus + landBonus) * lapBonusMult);

    // HP回復（30%）
    const hpRecover = Math.floor(p.baseMaxHp * 0.3);
    const newBaseHp = Math.min(p.baseMaxHp, p.baseHp + hpRecover);
    // 周回成長
    const char = getChar(p.charId);
    const atkGain = char?.lapAtk || 3;
    const hpGain = char?.lapHp || 5;

    const updates = {
      gold: (p.gold || 0) + bonus,
      baseHp: newBaseHp,
      baseMaxHp: p.baseMaxHp + hpGain,
      baseAtk: p.baseAtk + atkGain,
      lapCount: lapCount,
      cpDone: false,
      'effects/lapBoost': null,
    };
    await updatePlayer(currentRoomCode, myUid, updates);
    setMsg(`⭐ <span style="color:var(--text-gold)">周回ボーナス +${bonus}G！ ATK+${atkGain} HP+${hpGain}</span>`);
    await fbAddLog(currentRoomCode, `${p.name} 周回 +${bonus}G ATK+${atkGain}`);
    await wait(1000);

    // 毒解除
    if (p.effects?.poisoned) {
      await updatePlayer(currentRoomCode, myUid, { 'effects/poisoned': false });
    }
  } else {
    await updatePlayer(currentRoomCode, myUid, { cpDone: false });
    setMsg('⭐ ゴール通過（CP未達成 — 周回ボーナスなし）');
    await wait(800);
  }

  // ぴったり止まった場合は全土地コマンド
  if (isExact) {
    await showAllLandCommands(p);
  }
}

// ===== マスイベント =====
async function landEvent(p, cellId, passedCells) {
  const cells = roomState?.cells || {};
  const cell = cells[cellId];
  if (!cell) { await endTurn(); return; }

  // 毒ダメージ（ターン開始時）
  if (p.effects?.poisoned) {
    const poisonDmg = Math.floor(p.baseMaxHp * 0.1);
    const hp = applyDamage(p, poisonDmg);
    await updatePlayer(currentRoomCode, myUid, { baseHp: hp.baseHp, addHp: hp.addHp });
    setMsg(`☠ <span style="color:#dd44ff">毒のダメージ！ −${poisonDmg}</span>`);
    await wait(700);
    p = roomState?.players?.[myUid] || p;
    if (p.baseHp <= 0) { await handleDeath(p, null, null); return; }
  }

  if (cell.type === 'goal') {
    await handleGoalPass(p, true);
    await endTurn();
    return;
  }
  if (cell.type === 'cp') {
    // CPにぴったり止まった → 全土地コマンド
    await showAllLandCommands(p);
    await endTurn();
    return;
  }
  if (cell.type === 'shop') {
    await shopEvent(p);
    return;
  }
  if (cell.type === 'empty') {
    setMsg(`空き地 <b>マス${cellId}</b> — 購入: <span style="color:var(--text-gold)">100G</span>`);
    if (p.gold >= 100) {
      setCmds([
        { label: '🏠 購入 100G', cls: 'green', fn: () => buyLand(p, cell) },
        { label: 'スルー', fn: endTurn }
      ]);
    } else {
      setMsg(`空き地 <b>マス${cellId}</b> — 資金不足（100G必要）`);
      setCmds([{ label: 'スルー', fn: endTurn }]);
    }
    return;
  }
  if (cell.type === 'land') {
    if (cell.owner === myUid) {
      setMsg(`自分の土地 マス${cellId} Lv${cell.level}`);
      // 通過した土地のコマンド
      await showLandCommands(p, cell, passedCells.includes(cellId));
      return;
    }
    if (cell.owner) {
      const owner = roomState?.players?.[cell.owner];
      if (!owner) { await endTurn(); return; }
      const monster = cell.monster;
      const baseToll = calcToll(cell, monster);

      if (p.baseHp + p.addHp <= 0) {
        // HP0 → 強制2倍通行料
        const toll = baseToll * 2;
        setMsg(`HP0のため戦闘不可！<br>強制通行料 <span style="color:var(--fire)">${toll}G（2倍）</span>`);
        await payToll(p, cell, owner, toll);
        return;
      }

      setMsg(`<span style="color:${owner.color}">${owner.name}</span> の土地 Lv${cell.level}！<br>通行料: <span style="color:var(--text-gold)">${baseToll}G</span>`);
      setCmds([
        { label: '⚔ 侵略する', cls: 'red', fn: () => startBattleFlow(p, cell, owner, monster) },
        { label: `💰 半額 ${Math.floor(baseToll / 2)}G`, cls: 'blue', fn: () => payToll(p, cell, owner, Math.floor(baseToll / 2)) },
      ]);
      return;
    }
  }
  await endTurn();
}

// ===== 土地購入 =====
async function buyLand(p, cell) {
  const cost = 100;
  await updatePlayer(currentRoomCode, myUid, {
    gold: p.gold - cost,
    landAssets: (p.landAssets || 0) + cost
  });
  await updateCell(currentRoomCode, cell.id, {
    type: 'land',
    owner: myUid,
    investedCost: cost
  });
  await fbAddLog(currentRoomCode, `${p.name} マス${cell.id}を購入`);
  setMsg(`🏠 マス${cell.id}を購入！ モンスターを配置しよう`);
  await wait(700);
  // 購入後すぐにモンスター配置オプション
  p = roomState?.players?.[myUid] || p;
  const updatedCell = roomState?.cells?.[cell.id] || cell;
  await showLandCommands(p, updatedCell, true);
}

// ===== 土地コマンド =====
async function showLandCommands(p, cell, canCommand) {
  if (!canCommand) { await endTurn(); return; }
  const toll = calcToll(cell);
  const upgCost = cell.level < 5 ? cell.level * 100 : null;
  setMsg(`マス${cell.id} Lv${cell.level} — 通行料: ${toll}G`);
  const cmds = [
    { label: '🐉 モンスター配置', cls: 'purple', fn: () => showMonsterSelect(p, cell) }
  ];
  if (upgCost) cmds.push({ label: `⬆ Lv${cell.level + 1}に強化 ${upgCost}G`, cls: 'gold', disabled: p.gold < upgCost, fn: () => levelUp(p, cell) });
  cmds.push({ label: 'スルー', fn: endTurn });
  setCmds(cmds);
}

async function showAllLandCommands(p) {
  const cells = roomState?.cells || {};
  const myLands = Object.values(cells).filter(c => c.owner === myUid && c.type === 'land');
  if (myLands.length === 0) return;

  return new Promise(resolve => {
    showOverlay('土地コマンド（全土地）', '保有するすべての土地に操作できます',
      myLands.map(c => ({
        label: `マス${c.id} Lv${c.level} ${c.monster?.icon || '（モンスターなし）'}`,
        fn: async () => {
          hideOverlay();
          await showLandCommands(p, c, true);
          resolve();
        }
      })).concat([{ label: 'スキップ', fn: () => { hideOverlay(); resolve(); } }])
    );
  });
}

// ===== レベルアップ =====
async function levelUp(p, cell) {
  const cost = cell.level * 100;
  if (p.gold < cost) return;
  const newLevel = cell.level + 1;
  const newMonster = cell.monster ? {
    ...cell.monster,
    baseHp: cell.monster.baseHp + 10,
    maxHp: cell.monster.maxHp + 10,
    currentHp: Math.min(cell.monster.currentHp + 10, cell.monster.maxHp + 10)
  } : null;
  await updatePlayer(currentRoomCode, myUid, { gold: p.gold - cost });
  await updateCell(currentRoomCode, cell.id, {
    level: newLevel,
    investedCost: (cell.investedCost || 100) + cost,
    monster: newMonster
  });
  await fbAddLog(currentRoomCode, `${p.name} マス${cell.id} Lv${newLevel}にアップ`);
  setMsg(`⬆ マス${cell.id} を Lv${newLevel} に！ 通行料: ${Math.floor(50 * Math.pow(1.5, newLevel - 1))}G`);
  await wait(800);
  await endTurn();
}

// ===== モンスター選択 =====
function showMonsterSelect(p, cell) {
  const myMonsters = p.monsters || [];
  if (myMonsters.length === 0) {
    setMsg('手持ちモンスターがいません');
    setCmds([{ label: 'スルー', fn: endTurn }]);
    return;
  }
  showOverlay('🐉 モンスター配置',
    `マス${cell.id} Lv${cell.level}に配置します<br>属性がこの土地の属性になります`,
    myMonsters.map((m, idx) => ({
      label: `${m.icon || '👾'} ${m.name} ${ATTR[m.attr]?.label || ''} ATK:${m.atk} HP:${m.currentHp || m.baseHp}`,
      cls: m.attr === 'fire' ? 'red' : m.attr === 'water' ? 'blue' : 'green',
      fn: async () => {
        hideOverlay();
        await placeMonster(p, cell, m, idx);
      }
    })).concat([{ label: 'キャンセル', fn: () => { hideOverlay(); endTurn(); } }])
  );
}

async function placeMonster(p, cell, monster, monsterIdx) {
  const cost = cell.level * 50;
  if (p.gold < cost) {
    setMsg(`資金不足！ 配置コスト: ${cost}G`);
    await wait(800);
    await endTurn();
    return;
  }

  // モンスターのHPをレベルに合わせて調整
  const adjustedMonster = {
    ...monster,
    baseHp: monster.baseHp + (cell.level - 1) * 10,
    maxHp: monster.maxHp + (cell.level - 1) * 10,
    currentHp: monster.currentHp + (cell.level - 1) * 10
  };

  const newMonsters = [...(p.monsters || [])];
  newMonsters.splice(monsterIdx, 1);

  await updatePlayer(currentRoomCode, myUid, {
    gold: p.gold - cost,
    landAssets: Math.max(0, (p.landAssets || 0) - cost),
    monsters: newMonsters
  });
  await updateCell(currentRoomCode, cell.id, {
    attr: monster.attr,
    monster: adjustedMonster
  });

  await fbAddLog(currentRoomCode, `${p.name} マス${cell.id}に${monster.name}を配置`);
  setMsg(`🐉 ${monster.name}を配置！ 属性: ${ATTR[monster.attr]?.label || ''}`);
  await wait(800);
  await endTurn();
}

// ===== 通行料支払い =====
async function payToll(p, cell, owner, amount) {
  const newGold = Math.max(0, (p.gold || 0) - amount);
  await updatePlayer(currentRoomCode, myUid, { gold: newGold });
  await updatePlayer(currentRoomCode, owner.uid, { gold: (owner.gold || 0) + amount });
  await fbAddLog(currentRoomCode, `${p.name}→${owner.name} 通行料${amount}G`);
  setMsg(`💰 通行料 <span style="color:var(--text-gold)">${amount}G</span> 支払い`);
  await wait(700);

  // 手持ち0 → 強制売却
  if (newGold <= 0) {
    await checkBankruptcy();
    return;
  }
  await endTurn();
}

// ===== 戦闘フロー =====
async function startBattleFlow(attacker, cell, owner, monster) {
  // 装備選択
  const wp = attacker.weapons || [];
  const ap = attacker.armors || [];
  let selectedWeapon = null;
  let selectedArmor = null;

  selectedWeapon = await selectEquip('⚔ 武器を選択', wp, '手持ち武器:');
  selectedArmor = await selectEquip('🛡 防具を選択', ap, '手持ち防具:', true);

  // 戦闘画面へ
  showBattleScreen(attacker, cell, owner, monster, selectedWeapon, selectedArmor);
}

function selectEquip(title, items, desc, isArmor = false) {
  return new Promise(resolve => {
    const noneLabel = isArmor ? '🧍 なし（無防備）' : '✊ なし（素手）';
    const btns = [{ label: noneLabel, cls: 'gray', fn: () => { hideOverlay(); resolve(null); } }];
    items.forEach(it => {
      const canAfford = (roomState?.players?.[myUid]?.gold || 0) >= (it.cost || 0);
      const statStr = isArmor ? `加算HP+${it.addHp || 0}` : `ATK+${it.atk || 0}`;
      btns.push({
        label: `${it.name} (${statStr}) コスト:${it.cost || 0}G`,
        cls: canAfford ? (isArmor ? 'blue' : 'red') : 'gray',
        disabled: !canAfford,
        fn: () => { hideOverlay(); resolve(it); }
      });
    });
    showOverlay(title, desc + `（コスト不足は使用不可）`, btns);
  });
}

// ===== 戦闘画面 =====
function showBattleScreen(attacker, cell, owner, monster, weapon, armor) {
  showScreen('battleScreen');
  document.getElementById('battleResult').style.display = 'none';
  document.getElementById('battleCmd').style.display = 'flex';

  const finalAtk = playerTotalAtk(attacker, weapon) + (armor?.isMissile ? 0 : 0);
  const monAttr = cell.attr !== 'none' ? cell.attr : monster?.attr || 'none';
  const adjBonus = hasAdjacentBonus(cell, roomState?.cells || {});

  document.getElementById('battleHeader').textContent = `⚔ マス${cell.id} の戦闘`;
  document.getElementById('spritePlayer').textContent = attacker.icon;
  document.getElementById('spriteMonster').textContent = monster?.icon || '👾';
  document.getElementById('b-pname').textContent = attacker.name;
  document.getElementById('b-pbhp').textContent = attacker.baseHp;
  document.getElementById('b-pahp').textContent = attacker.addHp + (armor?.addHp || 0) + (weapon?.addHp || 0);
  document.getElementById('b-patk').textContent = finalAtk;
  document.getElementById('b-mname').textContent = monster?.name || '番人';
  document.getElementById('b-mhpnum').textContent = monster?.currentHp || '?';
  document.getElementById('b-mhpmax').textContent = monster?.maxHp || '?';
  document.getElementById('b-matk').textContent = (monster?.atk || owner?.baseAtk || 0) + (adjBonus ? '×1.5' : '');

  updateBattleHpBar('b-php', attacker.baseHp + attacker.addHp, attacker.baseMaxHp);
  updateBattleHpBar('b-mhp', monster?.currentHp || 0, monster?.maxHp || 1);

  setBattleMsg(`<b style="color:var(--fire)">${monster?.name || '番人'}</b> が現れた！${adjBonus ? '<br><span style="color:var(--cp)">⚡ 隣接ボーナス！ モンスターATK×1.5</span>' : ''}`);
  setBattleCmds([{ label: '▶ 戦闘開始', cls: 'red', fn: () => executeBattle(attacker, cell, owner, monster, weapon, armor) }]);
}

function updateBattleHpBar(id, hp, max) {
  const bar = document.getElementById(id);
  if (!bar) return;
  const pct = Math.max(0, hp / max * 100);
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? 'var(--hg)' : pct > 25 ? 'var(--hy)' : 'var(--hr)';
}

async function executeBattle(attacker, cell, owner, monster, weapon, armor) {
  setBattleCmds([]);

  // コスト消費（武器・防具）
  const p = roomState?.players?.[myUid] || attacker;
  let goldAfterEquip = p.gold;
  if (weapon?.cost) goldAfterEquip -= weapon.cost;
  if (armor?.cost) goldAfterEquip -= armor.cost;
  if (goldAfterEquip < 0) {
    setBattleMsg('ゴールドが不足して装備を使えなかった…');
    await wait(800);
    // 素手・無防具で再計算
    weapon = null; armor = null;
  } else if (weapon?.cost || armor?.cost) {
    await updatePlayer(currentRoomCode, myUid, { gold: goldAfterEquip });
  }

  const battleResult = simulateBattle(attacker, owner, {
    attackerWeapon: weapon,
    attackerArmor: armor,
    defenderMonster: monster,
    cell,
    allCells: roomState?.cells || {}
  });

  // 戦闘アニメーション
  for (const line of battleResult.log) {
    setBattleMsg(line);
    await wait(800);
  }

  // HP更新
  const newAHp = battleResult.attackerHpAfter;
  await updatePlayer(currentRoomCode, myUid, {
    baseHp: newAHp.baseHp,
    addHp: newAHp.addHp
  });
  updateBattleHpBar('b-php', newAHp.baseHp + newAHp.addHp, attacker.baseMaxHp);
  document.getElementById('b-pbhp').textContent = newAHp.baseHp;
  document.getElementById('b-pahp').textContent = newAHp.addHp;

  await updateCell(currentRoomCode, cell.id, { 'monster/currentHp': battleResult.defenderHpAfter });
  updateBattleHpBar('b-mhp', battleResult.defenderHpAfter, monster?.maxHp || 1);
  document.getElementById('b-mhpnum').textContent = battleResult.defenderHpAfter;

  // 戦闘後処理
  const effects = processBattleAfterEffects(
    battleResult, { ...attacker, _usedWeapon: weapon, _usedArmor: armor },
    cell, monster, roomState?.players || {}, roomState?.cells || {}
  );
  for (const eff of effects) {
    setBattleMsg(eff.msg);
    await wait(600);
    await applyBattleEffect(eff, attacker, cell, owner, monster);
  }

  // 毒付与
  if (battleResult.poisonApplied) {
    await updatePlayer(currentRoomCode, owner.uid, { 'effects/poisoned': true });
    setBattleMsg('☠ 毒状態になった！');
    await wait(600);
  }

  // 〇ちゃんねらー増殖
  if (battleResult.channelerCloned) {
    const cells = roomState?.cells || {};
    const emptyCells = Object.values(cells).filter(c => c.type === 'empty');
    if (emptyCells.length > 0) {
      const target = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      await updateCell(currentRoomCode, target.id, {
        type: 'land',
        owner: cell.owner,
        monster: { ...monster },
        attr: monster?.attr || 'grass',
        level: 1,
        investedCost: 0
      });
      setBattleMsg('💻 〇ちゃんねらーが増殖した！');
      await wait(600);
    }
  }

  // 加算HP回復（戦闘終了）
  const updatedP = roomState?.players?.[myUid] || attacker;
  const landAddHp = getLandAddHp(updatedP);
  await updatePlayer(currentRoomCode, myUid, { addHp: landAddHp });

  // 結果表示
  await showBattleResult(battleResult, attacker, cell, owner, monster, weapon, armor);
}

function getLandAddHp(p) {
  // 土地レベルによる加算HP（保有土地の最大レベル×10）
  const cells = roomState?.cells || {};
  const myLands = Object.values(cells).filter(c => c.owner === p.uid && c.type === 'land');
  if (myLands.length === 0) return 0;
  return Math.max(...myLands.map(c => c.level)) * 10;
}

async function applyBattleEffect(eff, attacker, cell, owner, monster) {
  const p = roomState?.players?.[myUid] || attacker;
  if (eff.type === 'selfDmg') {
    const hp = applyDamage(p, eff.value);
    await updatePlayer(currentRoomCode, myUid, hp);
  } else if (eff.type === 'forceHp1') {
    await updatePlayer(currentRoomCode, myUid, { baseHp: 1, addHp: 0 });
  } else if (eff.type === 'extraDmg') {
    const hp = applyDamage(p, eff.value);
    await updatePlayer(currentRoomCode, myUid, hp);
  } else if (eff.type === 'maxHpDebuff') {
    await updatePlayer(currentRoomCode, myUid, { baseMaxHp: Math.max(1, p.baseMaxHp - eff.value) });
  } else if (eff.type === 'ownerGold') {
    const o = roomState?.players?.[owner.uid] || owner;
    await updatePlayer(currentRoomCode, owner.uid, { gold: (o.gold || 0) + eff.value });
  } else if (eff.type === 'ownerGoldPct') {
    const o = roomState?.players?.[owner.uid] || owner;
    const change = Math.floor((o.gold || 0) * Math.abs(eff.value));
    await updatePlayer(currentRoomCode, owner.uid, { gold: Math.max(0, (o.gold || 0) - change) });
  } else if (eff.type === 'stealCard') {
    // カード奪取処理（簡易）
    const target = roomState?.players?.[myUid] || p;
    const allCards = [
      ...(target.weapons || []).map(c => ({ ...c, _type: 'weapon' })),
      ...(target.armors || []).map(c => ({ ...c, _type: 'armor' })),
      ...(target.spells || []).map(c => ({ ...c, _type: 'spell' })),
      ...(target.monsters || []).map(c => ({ ...c, _type: 'monster' })),
    ];
    if (allCards.length > 0) {
      const stolen = allCards[Math.floor(Math.random() * allCards.length)];
      setBattleMsg(`${stolen.name}を奪われた！`);
      // TODO: Firebase更新
    }
  } else if (eff.type === 'randomCard') {
    // ランダムカード入手（段ボール効果）
    // 簡易実装：スペルをランダムで付与
    const spell = SPELLS[Math.floor(Math.random() * SPELLS.length)];
    const p2 = roomState?.players?.[myUid] || p;
    const spells = [...(p2.spells || [])];
    if (spells.length < 3) {
      spells.push(spell);
      await updatePlayer(currentRoomCode, myUid, { spells });
      setBattleMsg(`📦 ${spell.name}を入手！`);
    } else {
      await updatePlayer(currentRoomCode, myUid, { gold: (p2.gold || 0) + 100 });
      setBattleMsg('📦 カードが満杯！ +100G');
    }
  } else if (eff.type === 'allMonsterHeal') {
    // 全モンスターHP回復（いやし系）
    const o = roomState?.players?.[owner.uid] || owner;
    const healed = (o.monsters || []).map(m => ({
      ...m,
      currentHp: Math.min(m.maxHp, (m.currentHp || m.baseHp) + Math.floor(m.baseHp * eff.value))
    }));
    await updatePlayer(currentRoomCode, owner.uid, { monsters: healed });
  } else if (eff.type === 'monsterHeal') {
    // モンスター自己回復
    const healAmt = Math.floor((monster?.maxHp || 0) * eff.value);
    const newHp = Math.min(monster?.maxHp || 0, (monster?.currentHp || 0) + healAmt);
    await updateCell(currentRoomCode, cell.id, { 'monster/currentHp': newHp });
  }
}

async function showBattleResult(battleResult, attacker, cell, owner, monster, weapon, armor) {
  const result = battleResult.result;
  let banner = '', bannerCls = '', detail = '';

  const p = roomState?.players?.[myUid] || attacker;

  if (result === 'attacker_win') {
    // 土地奪取
    const oldVal = landAssetValue(cell, roomState?.cells || {}, owner.uid);
    const newVal = landAssetValue({ ...cell, owner: myUid }, roomState?.cells || {}, myUid);
    await updateCell(currentRoomCode, cell.id, { owner: myUid });
    await updatePlayer(currentRoomCode, owner.uid, { landAssets: Math.max(0, (owner.landAssets || 0) - oldVal) });
    await updatePlayer(currentRoomCode, myUid, { landAssets: (p.landAssets || 0) + newVal });
    await fbAddLog(currentRoomCode, `${attacker.name} マス${cell.id}を奪取！`);
    banner = '✦ 勝利！ ✦'; bannerCls = 'result-win';
    detail = `${monster?.name || '番人'}を倒した！<br>マス${cell.id}を奪取！`;

  } else if (result === 'draw_both_dead') {
    // 相打ち（へ〇ま竜）
    await updateCell(currentRoomCode, cell.id, {
      owner: null, type: 'empty', monster: null, attr: 'none', level: 1, investedCost: 0
    });
    if (owner.uid !== myUid) {
      await updatePlayer(currentRoomCode, owner.uid, {
        landAssets: Math.max(0, (owner.landAssets || 0) - (cell.investedCost || 100))
      });
    }
    banner = '✦ 相打ち！ ✦'; bannerCls = 'result-draw';
    detail = '相打ち！ 土地が更地に戻った。通行料なし';

  } else if (result === 'draw') {
    const toll = calcToll(cell, monster);
    await updatePlayer(currentRoomCode, myUid, { gold: Math.max(0, (p.gold || 0) - toll) });
    await updatePlayer(currentRoomCode, owner.uid, { gold: (owner.gold || 0) + toll });
    await fbAddLog(currentRoomCode, `${attacker.name} 引き分け 通行料${toll}G`);
    banner = '✦ 引き分け ✦'; bannerCls = 'result-draw';
    detail = `HP変化なし<br>通行料 <span style="color:var(--text-gold)">${toll}G</span>`;

  } else if (result === 'defender_win' || result === 'attacker_forfeit') {
    // 敗北
    const toll = calcToll(cell, monster);
    const goldSteal = Math.floor((p.gold || 0) * 0.7);
    const totalTaken = toll + goldSteal;
    await updatePlayer(currentRoomCode, myUid, {
      gold: Math.max(0, (p.gold || 0) - totalTaken),
      baseHp: Math.max(1, Math.floor(p.baseMaxHp / 2)),
      addHp: 0
    });
    await updatePlayer(currentRoomCode, owner.uid, { gold: (owner.gold || 0) + totalTaken });
    await fbAddLog(currentRoomCode, `${attacker.name} 敗北 ${totalTaken}G奪取`);
    banner = '✦ 敗北… ✦'; bannerCls = 'result-lose';
    detail = `HP半分で復活<br>通行料 <span style="color:var(--fire)">${toll}G</span>＋手持ち70% <span style="color:var(--fire)">${goldSteal}G</span>`;
  }

  document.getElementById('battleCmd').style.display = 'none';
  const res = document.getElementById('battleResult');
  res.style.display = 'block';
  document.getElementById('resultBanner').textContent = banner;
  document.getElementById('resultBanner').className = 'result-banner ' + bannerCls;
  document.getElementById('resultDetail').innerHTML = detail;

  const rc = document.getElementById('resultCmd');
  rc.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn green';
  btn.textContent = '▶ ボードに戻る';
  btn.onclick = async () => {
    showScreen('gameScreen');
    // 手持ち0チェック
    const pLatest = roomState?.players?.[myUid];
    if (pLatest && pLatest.gold <= 0) {
      await checkBankruptcy();
    } else {
      await endTurn();
    }
  };
  rc.appendChild(btn);
}

// ===== ショップ =====
async function shopEvent(p) {
  const pool = [...WEAPONS.filter(w => !w.initial), ...ARMORS.filter(a => !a.initial), ...SPELLS, ...MONSTERS.filter(m => !m.initial)];
  const items = pool.sort(() => Math.random() - .5).slice(0, 3);
  setMsg(`🃏 カードショップ！ レアアイテムが並んでいる`);

  return new Promise(resolve => {
    showOverlay('🃏 カードショップ',
      items.map(it => `${it.name} — <span style="color:var(--text-gold)">${it.cost || 0}G</span>`).join('<br>'),
      items.map(it => {
        const canBuy = (p.gold || 0) >= (it.cost || 0);
        const typeKey = WEAPONS.some(w => w.id === it.id) ? 'weapon' :
                        ARMORS.some(a => a.id === it.id) ? 'armor' :
                        SPELLS.some(s => s.id === it.id) ? 'spell' : 'monster';
        return {
          label: `${it.icon || '📦'} ${it.name} (${it.cost || 0}G)`,
          cls: canBuy ? 'gold' : 'gray',
          disabled: !canBuy,
          fn: async () => {
            hideOverlay();
            await buyCard(p, it, typeKey);
            resolve();
          }
        };
      }).concat([{ label: '何も買わない', fn: () => { hideOverlay(); resolve(); endTurn(); } }])
    );
  });
}

async function buyCard(p, item, typeKey) {
  const cost = item.cost || 0;
  let updates = { gold: (p.gold || 0) - cost };
  const MAX = 3;

  if (typeKey === 'weapon') {
    const weapons = [...(p.weapons || [])];
    if (weapons.length >= MAX) {
      // 捨てるカード選択
      await discardCard(p, 'weapons', weapons, item, updates);
      return;
    }
    weapons.push(item);
    updates.weapons = weapons;
  } else if (typeKey === 'armor') {
    const armors = [...(p.armors || [])];
    if (armors.length >= MAX) {
      await discardCard(p, 'armors', armors, item, updates);
      return;
    }
    armors.push(item);
    updates.armors = armors;
  } else if (typeKey === 'spell') {
    const spells = [...(p.spells || [])];
    if (spells.length >= MAX) {
      await discardCard(p, 'spells', spells, item, updates);
      return;
    }
    spells.push(item);
    updates.spells = spells;
  } else if (typeKey === 'monster') {
    const monsters = [...(p.monsters || [])];
    if (monsters.length >= MAX) {
      await discardCard(p, 'monsters', monsters, { ...item, currentHp: item.baseHp }, updates);
      return;
    }
    monsters.push({ ...item, currentHp: item.baseHp });
    updates.monsters = monsters;
  }

  await updatePlayer(currentRoomCode, myUid, updates);
  await fbAddLog(currentRoomCode, `${p.name} ${item.name}を購入`);
  setMsg(`✔ ${item.name}を入手！`);
  await wait(700);
  await endTurn();
}

async function discardCard(p, key, current, newItem, baseUpdates) {
  return new Promise(resolve => {
    showOverlay('カードが満杯！', `1枚捨てて${newItem.name}を入手しますか？`,
      current.map((it, idx) => ({
        label: `捨てる: ${it.name}`,
        cls: 'red',
        fn: async () => {
          hideOverlay();
          const newArr = [...current];
          newArr.splice(idx, 1);
          if (key === 'monsters') newArr.push({ ...newItem, currentHp: newItem.baseHp });
          else newArr.push(newItem);
          const updates = { ...baseUpdates, [key]: newArr };
          await updatePlayer(currentRoomCode, myUid, updates);
          await fbAddLog(currentRoomCode, `${p.name} ${newItem.name}を入手`);
          setMsg(`✔ ${it.name}を捨てて${newItem.name}を入手！`);
          await wait(700);
          await endTurn();
          resolve();
        }
      })).concat([{
        label: '購入をキャンセル',
        fn: () => { hideOverlay(); endTurn(); resolve(); }
      }])
    );
  });
}

// ===== スペル選択 =====
function showSpellSelect() {
  const p = roomState?.players?.[myUid];
  if (!p || !p.spells?.length) { showMyTurnUI(); return; }

  showOverlay('🎴 スペルを使う', 'スペル使用後にダイスを振れます',
    p.spells.map((s, idx) => ({
      label: `${s.name} (コスト:${s.cost || 0}G)\n${s.desc || ''}`,
      cls: (p.gold || 0) >= (s.cost || 0) ? 'purple' : 'gray',
      disabled: (p.gold || 0) < (s.cost || 0),
      fn: () => { hideOverlay(); useSpell(p, s, idx); }
    })).concat([{ label: 'スペルを使わない', fn: () => { hideOverlay(); showMyTurnUI(); } }])
  );
}

async function useSpell(p, spell, idx) {
  const cost = spell.cost || 0;
  const newSpells = [...(p.spells || [])];
  newSpells.splice(idx, 1);
  const updates = { gold: (p.gold || 0) - cost, spells: newSpells };

  // エフェクト適用
  if (spell.effect === 'atkBoost') {
    updates['effects/atkBoost'] = { value: spell.value, until: 'nextGoal' };
  } else if (spell.effect === 'haste') {
    updates['effects/haste'] = (p.effects?.haste || 0) + spell.duration;
  } else if (spell.effect === 'lapBoost') {
    updates['effects/lapBoost'] = { value: spell.value, until: 'nextGoal' };
  } else if (spell.effect === 'deployMonster') {
    // ぶっこみ
    const cells = roomState?.cells || {};
    const empties = Object.values(cells).filter(c => c.type === 'empty');
    const monsters = p.monsters || [];
    if (empties.length > 0 && monsters.length > 0) {
      const target = empties[Math.floor(Math.random() * empties.length)];
      const mon = monsters[Math.floor(Math.random() * monsters.length)];
      const newMonsters = monsters.filter((_, i) => i !== monsters.indexOf(mon));
      await updateCell(currentRoomCode, target.id, {
        type: 'land', owner: myUid, monster: mon, attr: mon.attr, level: 1, investedCost: 0
      });
      updates.monsters = newMonsters;
      setMsg(`🎲 ${mon.name}をマス${target.id}に召喚！`);
    } else {
      updates.gold = (updates.gold || 0) + 300;
      setMsg('🎲 ぶっこみ！ 空き地なし → +300G');
    }
  } else if (spell.effect === 'damageMonsters') {
    // ぶつかりおじさん
    const cells = roomState?.cells || {};
    const targets = Object.values(cells).filter(c => c.type === 'land' && c.owner !== myUid && c.monster);
    const dmg = spell.value || 7;
    const count = spell.count || 3;
    const chosen = targets.length === 0 ? [] :
      targets.length === 1 ? Array(count).fill(targets[0]) :
      [...targets].sort(() => Math.random() - .5).slice(0, count);
    for (const t of chosen) {
      const newHp = Math.max(0, (t.monster.currentHp || t.monster.baseHp) - dmg);
      await updateCell(currentRoomCode, t.id, { 'monster/currentHp': newHp });
    }
    setMsg(`👴 ぶつかりおじさん！ ${count}体に${dmg}ダメージ`);
  } else if (spell.effect === 'slowDice') {
    // 牛歩戦術（対象選択）
    const players = Object.values(roomState?.players || {}).filter(pl => pl.uid !== myUid || true);
    await selectTargetPlayer(players, async target => {
      await updatePlayer(currentRoomCode, target.uid, {
        'effects/slowDice': (target.effects?.slowDice || 0) + spell.duration
      });
      setMsg(`🐢 ${target.name}に牛歩戦術！ ${spell.duration}ターンダイス1〜2`);
    });
    await updatePlayer(currentRoomCode, myUid, updates);
    showMyTurnUI();
    return;
  } else if (spell.effect === 'fixDice') {
    // イカサマのダイス
    const players = Object.values(roomState?.players || {});
    await selectTargetPlayer(players, async target => {
      const diceVal = await selectDiceValue();
      await updatePlayer(currentRoomCode, target.uid, { 'effects/fixDice': diceVal });
      setMsg(`🎰 ${target.name}のダイスを${diceVal}に固定！`);
    });
    await updatePlayer(currentRoomCode, myUid, updates);
    showMyTurnUI();
    return;
  } else if (spell.effect === 'stealCard') {
    // ジャ〇アンの理屈
    const players = Object.values(roomState?.players || {}).filter(pl => pl.uid !== myUid);
    await selectTargetPlayer(players, async target => {
      const all = [
        ...(target.weapons || []).map(c => ({ ...c, _type: 'weapons' })),
        ...(target.armors || []).map(c => ({ ...c, _type: 'armors' })),
        ...(target.spells || []).map(c => ({ ...c, _type: 'spells' })),
        ...(target.monsters || []).map(c => ({ ...c, _type: 'monsters' })),
      ];
      if (all.length === 0) { setMsg('カードがない！'); return; }
      const stolen = all[Math.floor(Math.random() * all.length)];
      // 相手から削除
      const newArr = (target[stolen._type] || []).filter(c => c.id !== stolen.id);
      await updatePlayer(currentRoomCode, target.uid, { [stolen._type]: newArr });
      // 自分に追加
      const p2 = roomState?.players?.[myUid] || p;
      const myArr = [...(p2[stolen._type] || [])];
      if (myArr.length < 3) {
        myArr.push(stolen);
        updates[stolen._type] = myArr;
      }
      setMsg(`👊 ${target.name}から${stolen.name}を奪った！`);
    });
  } else if (spell.effect === 'betaori') {
    // ベタオリ（モンスター選択）
    const cells = roomState?.cells || {};
    const myLands = Object.values(cells).filter(c => c.owner === myUid && c.type === 'land' && c.monster);
    if (myLands.length === 0) { setMsg('モンスターがいない'); showMyTurnUI(); return; }
    await selectTargetCell(myLands, async cell => {
      await updateCell(currentRoomCode, cell.id, { 'flags/betaori': true });
      setMsg(`🙅 ${cell.monster.name}にベタオリ設定！`);
    });
  } else if (spell.effect === 'morohiki') {
    // モロ引っ掛け
    const cells = roomState?.cells || {};
    const myLands = Object.values(cells).filter(c => c.owner === myUid && c.type === 'land' && c.monster);
    if (myLands.length === 0) { setMsg('モンスターがいない'); showMyTurnUI(); return; }
    await selectTargetCell(myLands, async cell => {
      await updateCell(currentRoomCode, cell.id, { 'flags/morohiki': true });
      setMsg(`🪤 マス${cell.id}にモロ引っ掛け設置！`);
    });
  } else if (spell.effect === 'manjiro') {
    // マン〇ャロ（自分 or モンスター選択）
    updates['effects/manjiro'] = { turns: 3, targetMonsterCellId: null };
    setMsg('💉 マン〇ャロ！ 3ターン間HP回復・ATK強化');
  }

  await updatePlayer(currentRoomCode, myUid, updates);
  await fbAddLog(currentRoomCode, `${p.name} ${spell.name}を使用`);
  await wait(700);
  showMyTurnUI(); // スペル使用後もダイスを振る
}

function selectTargetPlayer(players, cb) {
  return new Promise(resolve => {
    showOverlay('対象プレイヤー選択', '効果を適用するプレイヤーを選んでください',
      players.map(pl => ({
        label: `${pl.icon} ${pl.isAI ? 'AI' : pl.name}`,
        fn: async () => { hideOverlay(); await cb(pl); resolve(); }
      }))
    );
  });
}

function selectDiceValue() {
  return new Promise(resolve => {
    showOverlay('ダイスの目を指定', '1〜6で指定してください',
      [1,2,3,4,5,6].map(n => ({
        label: `${['⚀','⚁','⚂','⚃','⚄','⚅'][n-1]} ${n}`,
        fn: () => { hideOverlay(); resolve(n); }
      }))
    );
  });
}

function selectTargetCell(cells, cb) {
  return new Promise(resolve => {
    showOverlay('モンスターを選択', '対象のモンスターを選んでください',
      cells.map(c => ({
        label: `マス${c.id}: ${c.monster?.icon || '👾'} ${c.monster?.name || '???'}`,
        fn: async () => { hideOverlay(); await cb(c); resolve(); }
      }))
    );
  });
}

// ===== 破産・強制売却 =====
async function checkBankruptcy() {
  const p = roomState?.players?.[myUid];
  if (!p || p.gold > 0) { await endTurn(); return; }

  const cells = roomState?.cells || {};
  const myLands = Object.values(cells).filter(c => c.owner === myUid && c.type === 'land');
  if (myLands.length === 0) {
    setMsg(`<span style="color:var(--fire)">破産！土地もなくゲームオーバー…</span>`);
    await fbAddLog(currentRoomCode, `${p.name} 破産`);
    return;
  }

  sellCallback = endTurn;
  sellSelected = new Set();
  showSellScreen(p, myLands);
}

function showSellScreen(p, myLands) {
  showScreen('sellScreen');
  document.getElementById('sellDesc').innerHTML =
    `<span style="color:var(--water)">${p.name}</span> の手持ち: <span style="color:var(--fire)">${p.gold}G</span>　手持ちが1G以上になるまで売却してください`;
  renderSellList(p, myLands);
  updateSellStatus(p);
}

function renderSellList(p, myLands) {
  const cells = roomState?.cells || {};
  const list = document.getElementById('sellList');
  list.innerHTML = '';
  myLands.forEach(c => {
    const sp = sellPrice(c);
    const av = landAssetValue(c, cells, myUid);
    const cb = chainBonus(c.attr, cells, myUid);
    const isSel = sellSelected.has(c.id);
    const div = document.createElement('div');
    div.className = 'sell-item' + (isSel ? ' selected' : '');
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:700;color:${ATTR[c.attr]?.color || '#aaa'}">${c.monster?.icon || '⬜'} マス${c.id} Lv${c.level}</span>
        <span style="font-family:'DotGothic16',monospace;font-size:14px;color:${isSel ? 'var(--fire)' : 'var(--text-gold)'}">売 ${sp}G</span>
      </div>
      <div style="font-size:10px;color:var(--text-dim);line-height:1.8">
        属性: <span style="color:${ATTR[c.attr]?.color || '#aaa'}">${ATTR[c.attr]?.label || '無'}</span>　
        投下資本: ${c.investedCost || 100}G　資産価値: ${av}G${cb > 0 ? ` (+${Math.floor(cb * 100)}% 連鎖)` : ''}
      </div>
      ${isSel ? '<div style="font-size:11px;color:var(--fire);margin-top:4px">✓ 売却選択中</div>' : ''}
    `;
    div.onclick = () => {
      if (sellSelected.has(c.id)) sellSelected.delete(c.id);
      else sellSelected.add(c.id);
      const p2 = roomState?.players?.[myUid] || p;
      renderSellList(p2, myLands);
      updateSellStatus(p2);
    };
    list.appendChild(div);
  });
}

function updateSellStatus(p) {
  const cells = roomState?.cells || {};
  const total = Array.from(sellSelected).reduce((s, id) => {
    const c = cells[id]; return s + (c ? sellPrice(c) : 0);
  }, 0);
  const newGold = (p.gold || 0) + total;
  const ok = newGold > 0 && sellSelected.size > 0;
  document.getElementById('sellStatus').innerHTML =
    `売却合計: <span style="color:var(--text-gold)">${total}G</span>　売却後: <span style="color:${ok ? 'var(--hg)' : 'var(--fire)'}">${newGold}G</span>${ok ? '' : '（まだ足りません）'}`;
  document.getElementById('sellDoneBtn').disabled = !ok;
}

window.finishSell = async function() {
  const p = roomState?.players?.[myUid];
  if (!p) return;
  const cells = roomState?.cells || {};

  for (const id of sellSelected) {
    const c = cells[id];
    if (!c) continue;
    const sp = sellPrice(c);
    const av = landAssetValue(c, cells, myUid);
    await updatePlayer(currentRoomCode, myUid, {
      gold: (roomState?.players?.[myUid]?.gold || 0) + sp,
      landAssets: Math.max(0, (roomState?.players?.[myUid]?.landAssets || 0) - av)
    });
    await updateCell(currentRoomCode, id, {
      owner: null, type: 'empty', attr: 'none', monster: null, level: 1, investedCost: 0
    });
    await fbAddLog(currentRoomCode, `${p.name} マス${id}を売却 +${sp}G`);
  }
  sellSelected.clear();
  showScreen('gameScreen');
  if (sellCallback) { const cb = sellCallback; sellCallback = null; setTimeout(cb, 300); }
};

// ===== ターン終了 =====
async function endTurn() {
  if (!roomState) return;
  const players = Object.values(roomState.players || {});
  const currentTurnUid = roomState.turn?.uid;
  const currentIdx = players.findIndex(p => p.uid === currentTurnUid);
  const nextIdx = (currentIdx + 1) % players.length;
  const nextPlayer = players[nextIdx];
  const newCount = (roomState.turn?.count || 1) + (nextIdx === 0 ? 1 : 0);

  await updateTurn(currentRoomCode, nextPlayer.uid, newCount);

  // AI処理
  if (nextPlayer.isAI) {
    await wait(600);
    await runAI(nextPlayer);
  }
}

// ===== AI処理（簡易）=====
async function runAI(aiPlayer) {
  const roll = Math.floor(Math.random() * 6) + 1;
  setMsg(`🤖 ${aiPlayer.name} のターン — ダイス ${roll}`);
  await wait(800);

  let pos = aiPlayer.pos;
  for (let i = 0; i < roll; i++) {
    pos = (pos + 1) % N;
    await updatePlayer(currentRoomCode, aiPlayer.uid, { pos });
    drawBoard();
    await wait(250);
  }

  const cells = roomState?.cells || {};
  const cell = cells[pos];

  if (cell?.type === 'empty' && aiPlayer.gold >= 100) {
    await updatePlayer(currentRoomCode, aiPlayer.uid, {
      gold: aiPlayer.gold - 100,
      landAssets: (aiPlayer.landAssets || 0) + 100
    });
    await updateCell(currentRoomCode, pos, {
      type: 'land', owner: aiPlayer.uid, investedCost: 100
    });
    // AIは初期モンスター配置
    if (aiPlayer.monsters?.length > 0) {
      const mon = aiPlayer.monsters[0];
      const newMonsters = [...aiPlayer.monsters];
      newMonsters.splice(0, 1);
      await updatePlayer(currentRoomCode, aiPlayer.uid, { monsters: newMonsters });
      await updateCell(currentRoomCode, pos, {
        attr: mon.attr, monster: { ...mon, currentHp: mon.baseHp }
      });
    }
  } else if (cell?.type === 'land' && cell?.owner && cell?.owner !== aiPlayer.uid) {
    // AI：通行料を払う
    const owner = roomState?.players?.[cell.owner];
    if (owner) {
      const toll = Math.floor(calcToll(cell, cell.monster) / 2);
      await updatePlayer(currentRoomCode, aiPlayer.uid, { gold: Math.max(0, aiPlayer.gold - toll) });
      await updatePlayer(currentRoomCode, owner.uid, { gold: (owner.gold || 0) + toll });
    }
  }

  // CP処理
  if (cell?.type === 'cp' && !aiPlayer.cpDone) {
    await updatePlayer(currentRoomCode, aiPlayer.uid, { cpDone: true, gold: aiPlayer.gold + 100 });
  }
  // ゴール処理
  if (cell?.type === 'goal' || pos === 0) {
    await handleAIGoal(aiPlayer);
  }

  await wait(400);
  await endTurn();
}

async function handleAIGoal(p) {
  if (p.cpDone) {
    const lapBonus = 500 + (p.lapCount || 0) * 100;
    const hpRecover = Math.floor(p.baseMaxHp * 0.3);
    const char = getChar(p.charId);
    await updatePlayer(currentRoomCode, p.uid, {
      gold: (p.gold || 0) + lapBonus,
      baseHp: Math.min(p.baseMaxHp, p.baseHp + hpRecover),
      baseMaxHp: p.baseMaxHp + (char?.lapHp || 5),
      baseAtk: p.baseAtk + (char?.lapAtk || 3),
      lapCount: (p.lapCount || 0) + 1,
      cpDone: false
    });
    await fbAddLog(currentRoomCode, `${p.name} 周回 +${lapBonus}G`);
  } else {
    await updatePlayer(currentRoomCode, p.uid, { cpDone: false });
  }
}

// ===== マスクリック（詳細ポップアップ）=====
function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sx;
  const r = canvas.width * 0.055;

  const hit = positions.findIndex(p => Math.abs(p.x - mx) < r + 6 && Math.abs(p.y - my) < r + 6);
  if (hit >= 0) showCellPopup(hit);
}

function showCellPopup(cellId) {
  const cells = roomState?.cells || {};
  const players = roomState?.players || {};
  const cell = cells[cellId];
  if (!cell) return;

  const owner = cell.owner ? players[cell.owner] : null;
  const monster = cell.monster;
  const toll = calcToll(cell, monster);
  const av = cell.type === 'land' ? landAssetValue(cell, cells, cell.owner) : 0;

  document.getElementById('cpTitle').textContent =
    `${cell.type === 'goal' ? '⭐' : cell.type === 'cp' ? '🚩' : cell.type === 'shop' ? '🃏' : monster?.icon || '⬜'} マス${cellId}`;

  const rows = [
    ['種類', { goal: 'ゴール', cp: 'チェックポイント', shop: 'ショップ', land: '土地', empty: '空き地' }[cell.type] || '?'],
    cell.type === 'land' ? ['土地レベル', `Lv${cell.level}`] : null,
    cell.type === 'land' ? ['通行料', `${toll}G`] : null,
    cell.type === 'land' ? ['資産価値', `${av}G`] : null,
    owner ? ['所有者', `${owner.icon} ${owner.name}`] : null,
    monster ? ['モンスター', `${monster.icon || '👾'} ${monster.name}`] : null,
    monster ? ['モンスターHP', `${monster.currentHp || monster.baseHp} / ${monster.maxHp}`] : null,
    monster ? ['モンスターATK', `${monster.atk}${hasAdjacentBonus(cell, cells) ? ' (×1.5隣接)' : ''}`] : null,
    cell.attr !== 'none' ? ['属性', ATTR[cell.attr]?.label || '？'] : null,
  ].filter(Boolean);

  document.getElementById('cpRows').innerHTML = rows.map(([k, v]) =>
    `<div class="cell-popup-row"><span>${k}</span><span>${v}</span></div>`
  ).join('');

  document.getElementById('cellPopup').classList.add('show');
}

window.closeCellPopup = () => document.getElementById('cellPopup').classList.remove('show');

// ===== 最終結果 =====
function showFinalResult(players, cells) {
  showScreen('resultScreen');
  const sorted = [...players].sort((a, b) => totalAssets(b, cells) - totalAssets(a, cells));
  const rankEmoji = ['🥇', '🥈', '🥉', '4位'];
  const list = document.getElementById('finalRankList');
  list.innerHTML = '';
  sorted.forEach((p, i) => {
    const ta = totalAssets(p, cells);
    const div = document.createElement('div');
    div.className = `final-rank-item${i === 0 ? ' rank1' : ''}`;
    div.innerHTML = `
      <div class="final-rank-num">${rankEmoji[i] || i + 1 + '位'}</div>
      <div class="final-rank-icon">${p.icon}</div>
      <div class="final-rank-info">
        <div class="final-rank-name">${p.isAI ? 'AI' : p.name}</div>
        <div class="final-rank-assets">${ta.toLocaleString()} G</div>
      </div>
    `;
    list.appendChild(div);
  });
}

// ===== 共通UI関数 =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function setMsg(html) {
  const el = document.getElementById('msgBox');
  if (el) el.innerHTML = html + '<span class="msg-cursor">█</span>';
}

function setCmds(btns) {
  const area = document.getElementById('cmdArea');
  if (!area) return;
  area.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn ' + (b.cls || '');
    el.textContent = b.label;
    el.disabled = !!b.disabled;
    el.onclick = b.fn;
    area.appendChild(el);
  });
}

function setBattleMsg(html) {
  const el = document.getElementById('battleMsg');
  if (el) el.innerHTML = html + '<span class="msg-cursor">█</span>';
}

function setBattleCmds(btns) {
  const row = document.getElementById('battleCmd');
  if (!row) return;
  row.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn ' + (b.cls || '');
    el.textContent = b.label;
    el.disabled = !!b.disabled;
    el.onclick = b.fn;
    row.appendChild(el);
  });
}

function showOverlay(title, desc, btns) {
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovDesc').innerHTML = desc;
  const list = document.getElementById('ovList');
  list.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('button');
    el.className = 'ov-btn ' + (b.cls || '');
    el.innerHTML = b.label.replace(/\n/g, '<br>');
    el.disabled = !!b.disabled;
    el.onclick = b.fn;
    list.appendChild(el);
  });
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

window.toggleLog = function() {
  const b = document.getElementById('logBody');
  const open = b.classList.toggle('open');
  const la = document.getElementById('logArrow');
  if (la) la.textContent = open ? '▲' : '▼';
};

function addLocalLog(msg) {
  const el = document.getElementById('logBody');
  if (!el) return;
  const d = document.createElement('div');
  d.innerHTML = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function showPlayerDetail(p, cells) {
  // プレイヤーカードクリックで詳細表示（簡易）
  const ta = totalAssets(p, cells);
  const myLands = Object.values(cells).filter(c => c.owner === p.uid && c.type === 'land');
  showOverlay(
    `${p.icon} ${p.isAI ? 'AI' : p.name}`,
    `総資産: ${ta}G<br>手持ち: ${p.gold}G<br>基礎HP: ${p.baseHp}/${p.baseMaxHp}<br>加算HP: ${p.addHp}<br>ATK: ${p.baseAtk}<br>所有土地: ${myLands.length}マス${p.effects?.poisoned ? '<br><span style="color:#dd44ff">☠ 毒状態</span>' : ''}`,
    [{ label: '閉じる', fn: hideOverlay }]
  );
}
